model:
  num_agents: 10
  num_tasks: 30
  dim: 32

  lambda_align: 0.5
  eta_theta: 0.1
  eta_memory: 0.05

  temperature_init: 4.0
  min_temperature: 1.0
  max_temperature: 6.0
  proposal_candidates: 12
  proposal_task_sample: 8
  agent_sample_size: 6
  block_move_size: 4
  warm_start_steps: 6
  warm_start_type: greedy
  hybrid_cleanup_prob: 0.25
  local_refine_steps: 2

  target_accept_rate: 0.3

  risk_weight: 1.0
  risk_scale: 1.0
  interaction_weight: 1.0
  cost_weight: 1.0

training:
  iterations: 5000
  seed: 42
  log_every: 50

sweep:
  interaction_weights: [0.0, 0.5, 1.0, 2.0, 5.0]
  risk_weights: [1.0]
  cost_weights: [1.0]
  scenario: "Interaction"
  iterations: 100